# Aegis Auditor — local/staging stack.
# `api` runs today; `postgres` and `redis` are provisioned for Phase 1+/2+.

services:
  api:
    build: .
    ports:
      - "4000:4000"
    environment:
      PORT: "4000"
      HOST: "0.0.0.0"
      LOG_LEVEL: "info"
      DATABASE_URL: "postgresql://aegis:aegis@postgres:5432/aegis?schema=public"
      REDIS_URL: "redis://redis:6379"
      AEGIS_ROLE: "api" # API enqueues only; the worker service processes scans
      JWT_SECRET: "${JWT_SECRET:-change-me-in-production}" # override in .env for real deploys
      RATE_LIMIT_MAX: "10"
      # SSRF protection is ON by default. Create the schema once before first boot:
      #   docker compose run --rm api npx prisma db push --skip-generate
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build: .
    command: ["node", "dist/worker.js"]
    environment:
      LOG_LEVEL: "info"
      DATABASE_URL: "postgresql://aegis:aegis@postgres:5432/aegis?schema=public"
      REDIS_URL: "redis://redis:6379"
      AEGIS_ROLE: "worker"
      SCAN_CONCURRENCY: "4"
      JWT_SECRET: "${JWT_SECRET:-change-me-in-production}"
      # Active DAST (authorization-gated) runs on the worker, never the API.
      # Empty by default → the ZAP module degrades to an info finding. Set
      # ZAP_API_URL=http://zap:8080 and start the `active` profile to enable it.
      ZAP_API_URL: "${ZAP_API_URL:-}"
      ZAP_API_KEY: "${ZAP_API_KEY:-aegis-zap}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    # Scale out with: docker compose up --scale worker=3

  # OWASP ZAP daemon — active-scan engine for the worker. Opt-in: it's heavy, so
  # it only starts under the `active` profile:
  #   ZAP_API_URL=http://zap:8080 docker compose --profile active up
  zap:
    image: ghcr.io/zaproxy/zaproxy:stable
    profiles: ["active"]
    command: >
      zap.sh -daemon -host 0.0.0.0 -port 8080
      -config api.key=${ZAP_API_KEY:-aegis-zap}
      -config api.addrs.addr.name=.*
      -config api.addrs.addr.regex=true
    expose:
      - "8080"
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    ports:
      - "3200:3200"
    environment:
      NODE_ENV: "production"
      API_ORIGIN: "http://api:4000" # server-side proxy target (internal network)
      NEXT_PUBLIC_WS_ORIGIN: "${WS_ORIGIN:-ws://localhost:4000}" # browser WS; set to your public wss:// URL
    depends_on:
      - api
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aegis
      POSTGRES_PASSWORD: aegis
      POSTGRES_DB: aegis
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aegis"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
