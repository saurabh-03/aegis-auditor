# Render Blueprint — Aegis stack (free-tier friendly).
# https://render.com/docs/blueprint-spec
#
# Usage: New → Blueprint → connect saurabh-03/aegis-auditor → Apply.
#
# Free tier does NOT allow background Worker services, so this runs everything in
# the single `aegis-api` web service: with REDIS_URL unset the app uses its
# in-process queue (enqueue + process scans + live WebSocket progress + scheduler
# all in one process). For scale, add REDIS_URL + a `type: worker` service on a
# paid plan (see docs/DEPLOY-PUBLIC.md). Postgres is kept for persistence.

databases:
  - name: aegis-postgres
    plan: free # 90-day free Postgres; upgrade for production
    postgresMajorVersion: "16"

services:
  # ---- API + scan engine + scheduler, all in one process (free-tier friendly) ----
  - type: web
    name: aegis-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    # Schema sync + server start is handled by the image entrypoint
    # (docker-entrypoint.sh) — no dockerCommand, to avoid shell-quoting issues.
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase: { name: aegis-postgres, property: connectionString }
      # No REDIS_URL → in-process queue processes scans in this same service.
      - key: JWT_SECRET
        generateValue: true # Render generates a strong secret
      - key: RATE_LIMIT_MAX
        value: "10" # tighter default for a public instance
      # SSRF protection stays ON by default (do NOT set ALLOW_PRIVATE_TARGETS).
      # Optional: require login even for the quick scan endpoint.
      # - key: REQUIRE_AUTH_FOR_SCAN
      #   value: "1"

  # ---- Web dashboard (Next.js) ----
  - type: web
    name: aegis-web
    runtime: node
    plan: free
    # --include=dev is REQUIRED: Render sets NODE_ENV=production, under which
    # npm skips devDependencies — but the Next.js build needs typescript,
    # tailwind, postcss, and @types. Without this only ~25 prod packages install
    # and the tsconfig "@/*" alias can't resolve. `npm install` (not `npm ci`)
    # also tolerates lockfile drift across npm versions.
    buildCommand: cd web && npm install --include=dev --no-audit --no-fund && npm run build
    # Must bind Render's assigned $PORT (not the hardcoded 3200 dev port).
    startCommand: cd web && npx next start -H 0.0.0.0 -p $PORT
    envVars:
      - key: NODE_ENV
        value: production
      # After the first deploy, set these to the API service's real URL
      # (Render → aegis-api → copy its https URL). They can't be auto-derived
      # with a protocol prefix, so they're left for you to fill in once.
      - key: API_ORIGIN
        sync: false # e.g. https://aegis-api.onrender.com
      - key: NEXT_PUBLIC_WS_ORIGIN
        sync: false # e.g. wss://aegis-api.onrender.com
