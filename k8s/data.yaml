# PostgreSQL + Redis for Aegis. For production, prefer managed offerings
# (RDS/Cloud SQL, ElastiCache/Upstash) and delete these; they exist so the
# stack is self-contained for staging/dev clusters.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: aegis-postgres-pvc
  namespace: aegis
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aegis-postgres
  namespace: aegis
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector: { matchLabels: { app: aegis-postgres } }
  template:
    metadata: { labels: { app: aegis-postgres } }
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports: [{ containerPort: 5432 }]
          env:
            - { name: POSTGRES_USER, value: aegis }
            - { name: POSTGRES_DB, value: aegis }
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: aegis-secrets, key: POSTGRES_PASSWORD } }
          readinessProbe:
            exec: { command: ["pg_isready", "-U", "aegis"] }
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - { name: data, mountPath: /var/lib/postgresql/data }
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: aegis-postgres-pvc }
---
apiVersion: v1
kind: Service
metadata:
  name: aegis-postgres
  namespace: aegis
spec:
  selector: { app: aegis-postgres }
  ports: [{ port: 5432, targetPort: 5432 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aegis-redis
  namespace: aegis
spec:
  replicas: 1
  selector: { matchLabels: { app: aegis-redis } }
  template:
    metadata: { labels: { app: aegis-redis } }
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args: ["redis-server", "--appendonly", "yes"]
          ports: [{ containerPort: 6379 }]
          readinessProbe:
            exec: { command: ["redis-cli", "ping"] }
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: aegis-redis
  namespace: aegis
spec:
  selector: { app: aegis-redis }
  ports: [{ port: 6379, targetPort: 6379 }]
